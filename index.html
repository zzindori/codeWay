<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>codeWay</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── AppBar ── */
    #appbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #3949ab;
      padding: 0 16px;
      height: 56px;
      flex-shrink: 0;
    }
    #appbar h1 { font-size: 18px; font-weight: 600; }
    #resetBtn, #debugBtn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #resetBtn:hover, #debugBtn:hover { background: rgba(255,255,255,0.15); }
    #debugBtn.active { background: rgba(255,255,255,0.25); }

    /* ── 디버그 로그 ── */
    #debugLog {
      display: none;
      position: absolute;
      left: 0; right: 0; bottom: 0;
      max-height: 40%;
      overflow-y: auto;
      background: rgba(0,0,0,0.85);
      color: #0f0;
      font-family: Consolas, monospace;
      font-size: 11px;
      padding: 8px;
      white-space: pre-wrap;
      word-break: break-all;
      z-index: 20;
    }
    #debugLog.show { display: block; }

    /* ── 카메라 뷰 ── */
    #scanView {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }


    /* 스캔 가이드 박스 */
    #guide {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 260px;
      height: 260px;
      border: 3px solid #7986cb;
      border-radius: 12px;
      pointer-events: none;
    }

    /* 배지 */
    #badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(67, 160, 71, 0.92);
      color: #fff;
      font-size: 22px;
      font-weight: bold;
      padding: 12px 28px;
      border-radius: 30px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    #badge.error { background: rgba(211, 47, 47, 0.92); }
    #badge.show { opacity: 1; }

    /* 하단 오버레이 */
    #overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.65);
      padding: 10px 14px 14px;
    }
    #overlayHint {
      text-align: center;
      font-size: 15px;
      color: #fff;
      padding: 4px 0;
    }
    #progressBar {
      width: 100%;
      height: 5px;
      background: #444;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    #progressFill {
      height: 100%;
      background: #7986cb;
      border-radius: 3px;
      transition: width 0.2s;
      width: 0%;
    }
    #chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .chip {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      border: 1.5px solid #666;
      color: #aaa;
      background: #222;
      transition: background 0.15s, border-color 0.15s;
    }
    .chip.done {
      background: #388e3c;
      border-color: #69f0ae;
      color: #fff;
    }
    #overlayCount {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    /* ── 결과 뷰 ── */
    #resultView {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }
    #resultView.active { display: flex; }

    #verifyBanner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: bold;
      flex-shrink: 0;
    }
    #verifyBanner.ok { background: #2e7d32; }
    #verifyBanner.fail { background: #c62828; }

    #resultTextWrap {
      flex: 1;
      overflow: hidden;
      padding: 12px;
    }
    #resultText {
      width: 100%;
      height: 100%;
      background: #fafafa;
      color: #111;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      resize: none;
      outline: none;
    }

    #resultActions {
      padding: 8px 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .btnRow {
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.75; }
    .btn-indigo { background: #3949ab; color: #fff; }
    .btn-teal   { background: #00796b; color: #fff; }
    .btn-grey   { background: #546e7a; color: #fff; width: 100%; }

    /* 토스트 */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #37474f;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      white-space: nowrap;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
    #toast.error { background: #b71c1c; }

    /* 카메라 시작 전 */
    #startScreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
    }
    #startScreen p {
      color: #aaa;
      text-align: center;
      font-size: 15px;
      line-height: 1.6;
    }
    #startBtn {
      background: #3949ab;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 36px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="appbar">
  <h1>codeWay</h1>
  <div style="display:flex;">
    <button id="debugBtn" title="디버그 로그">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 9h.01M15 9h.01M8 13a4 4 0 0 0 8 0"/><circle cx="12" cy="12" r="10"/>
      </svg>
    </button>
    <button id="resetBtn" title="초기화">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
  </div>
</div>

<!-- 카메라 시작 전 -->
<div id="startScreen">
  <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#7986cb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
    <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
  </svg>
  <p>카메라를 사용해 QR 코드를 스캔합니다.<br>다중 QR 청크를 자동으로 조합하고<br>무결성을 검증합니다.</p>
  <button id="startBtn">카메라 시작</button>
</div>

<!-- 스캔 뷰 -->
<div id="scanView" style="display:none;">
  <video id="video" playsinline autoplay muted></video>
  <div id="guide"></div>
  <div id="badge"></div>
  <div id="overlay">
    <div id="overlayHint">QR 코드를 스캔하세요</div>
    <div id="progressBar" style="display:none;"><div id="progressFill"></div></div>
    <div id="chips"></div>
    <div id="overlayCount"></div>
  </div>
  <div id="debugLog"></div>
</div>

<!-- 결과 뷰 -->
<div id="resultView">
  <div id="verifyBanner"></div>
  <div id="resultTextWrap">
    <textarea id="resultText" readonly></textarea>
  </div>
  <div id="resultActions">
    <div class="btnRow">
      <button class="btn btn-indigo" id="copyBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        클립보드에 복사
      </button>
      <button class="btn btn-teal" id="saveBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        파일 저장
      </button>
    </div>
    <button class="btn btn-grey" id="rescanBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      다시 스캔
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
// ── 상태 ──
const state = {
  chunks: {},
  totalChunks: 0,
  expectedHash: null,
  lastScanned: null,
  completed: false,
  scanning: false,
  animFrame: null,
};

// ── DOM ──
const $ = id => document.getElementById(id);
const video      = $('video');
const badge      = $('badge');
const overlay    = $('overlay');
const overlayHint= $('overlayHint');
const progressBar= $('progressBar');
const progressFill=$('progressFill');
const chips      = $('chips');
const overlayCount=$('overlayCount');
const scanView   = $('scanView');
const resultView = $('resultView');
const startScreen= $('startScreen');
const verifyBanner=$('verifyBanner');
const debugLog   = $('debugLog');
const debugBtn   = $('debugBtn');

// ── 디버그 로그 ──
let debugOn = false;
function dlog(line) {
  if (!debugOn) return;
  const ts = new Date().toISOString().substring(11, 23);
  debugLog.textContent += `[${ts}] ${line}\n`;
  debugLog.scrollTop = debugLog.scrollHeight;
}
debugBtn.addEventListener('click', () => {
  debugOn = !debugOn;
  debugBtn.classList.toggle('active', debugOn);
  debugLog.classList.toggle('show', debugOn);
});
const resultText = $('resultText');

// ── SHA256 (Web Crypto) ──
async function sha256hex(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── QR 파싱 ──
const QR_RE = /^\[(\d{3})\/(\d{3}):([a-f0-9]{16})\]([\s\S]*)$/;
function parseQr(raw) {
  // 일부 QR 생성기가 비ASCII 데이터 인코딩 시 앞에 UTF-8 BOM(U+FEFF)을 붙이는 경우가 있어 제거
  const m = QR_RE.exec(raw.replace(/^\uFEFF/, ''));
  if (!m) return null;
  return { index: parseInt(m[1]), total: parseInt(m[2]), hash: m[3], data: m[4] };
}

// ── 배지 ──
let badgeTimer = null;
function showBadge(text, isError = false) {
  badge.textContent = text;
  badge.className = isError ? 'error show' : 'show';
  clearTimeout(badgeTimer);
  badgeTimer = setTimeout(() => badge.classList.remove('show'), 900);
}

// ── 토스트 ──
let toastTimer = null;
function showToast(text, isError = false) {
  const t = $('toast');
  t.textContent = text;
  t.className = isError ? 'show error' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── 진행 UI 업데이트 ──
function updateProgress() {
  const { chunks, totalChunks } = state;
  const count = Object.keys(chunks).length;
  if (totalChunks === 0) return;

  progressBar.style.display = 'block';
  progressFill.style.width = `${(count / totalChunks) * 100}%`;

  chips.innerHTML = '';
  for (let i = 1; i <= totalChunks; i++) {
    const div = document.createElement('div');
    div.className = 'chip' + (chunks[i] !== undefined ? ' done' : '');
    div.innerHTML = chunks[i] !== undefined
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
      : `${i}`;
    chips.appendChild(div);
  }

  overlayCount.textContent = `${count} / ${totalChunks} 스캔됨`;
  overlayHint.style.display = 'none';
}

// ── 조합 & 검증 ──
async function assemble(total) {
  let buf = '';
  for (let i = 1; i <= total; i++) buf += state.chunks[i] ?? '';

  const actualHash = (await sha256hex(buf)).substring(0, 16);
  const ok = actualHash === state.expectedHash;

  state.completed = true;
  cancelAnimationFrame(state.animFrame);

  // 카메라 스트림 정지
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }

  scanView.style.display = 'none';
  resultView.classList.add('active');

  verifyBanner.className = ok ? 'ok' : 'fail';
  verifyBanner.innerHTML = ok
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 검증 완료 — 원본과 일치합니다 ✓'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> 경고 — 원본과 불일치! 다시 스캔하세요';

  resultText.value = buf;
}

// ── QR 감지 콜백 ──
async function onDetect(raw) {
  if (state.completed) return;
  if (raw === state.lastScanned) return;
  state.lastScanned = raw;
  setTimeout(() => { state.lastScanned = null; }, 800);

  dlog(`RAW(${raw.length}b): ${raw.substring(0, 80)}${raw.length > 80 ? '…' : ''}`);

  const parsed = parseQr(raw);
  if (!parsed) {
    dlog('→ 헤더 정규식 불일치 (형식 오류)');
    showBadge('형식 오류', true);
    return;
  }

  if (state.chunks[parsed.index] !== undefined) {
    dlog(`→ 중복 청크 무시 (${parsed.index}/${parsed.total})`);
    return;
  }

  state.totalChunks = parsed.total;
  state.expectedHash = parsed.hash;
  state.chunks[parsed.index] = parsed.data;

  showBadge(`✓  ${parsed.index} / ${parsed.total}`);
  updateProgress();

  if (Object.keys(state.chunks).length === parsed.total) {
    await assemble(parsed.total);
  }
}

// ── 디코더 선택 (네이티브 BarcodeDetector 우선, 미지원 시 jsQR 캔버스 캡처 폴백 — JoA 웹앱과 동일 방식, iOS Safari 호환) ──
let barcodeDetector = null;
let decoderName = 'none';
if ('BarcodeDetector' in window) {
  try {
    barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
    decoderName = 'BarcodeDetector';
  } catch (e) {
    barcodeDetector = null;
  }
}
if (!barcodeDetector) decoderName = 'jsQR (fallback)';
console.log('[codeWay] decoder =', decoderName, ', BarcodeDetector in window =', 'BarcodeDetector' in window);
debugBtn.addEventListener('click', () => {
  if (debugOn) dlog(`디코더: ${decoderName} / BarcodeDetector 지원: ${'BarcodeDetector' in window}`);
}, { once: false });

const scanCanvas = document.createElement('canvas');
const scanCtx = scanCanvas.getContext('2d', { willReadFrequently: true });

function decodeWithJsQR() {
  const w = video.videoWidth;
  const h = video.videoHeight;
  if (!w || !h) return null;
  scanCanvas.width = w;
  scanCanvas.height = h;
  scanCtx.drawImage(video, 0, 0, w, h);
  const imageData = scanCtx.getImageData(0, 0, w, h);
  const code = jsQR(imageData.data, w, h, { inversionAttempts: 'dontInvert' });
  return code ? code.data : null;
}

// ── 스캔 루프 ──
// jsQR 경로는 풀해상도 캔버스 캡처+디코딩 비용이 커서 매 프레임 돌리면 iOS에서 오히려
// 부하로 인식률이 떨어짐 → JoA와 동일하게 약 250ms 간격으로 스로틀링
const JSQR_INTERVAL_MS = 250;
let detecting = false;
let lastEmptyLog = 0;
let lastJsQrAttempt = 0;
async function tick() {
  if (!state.scanning || state.completed) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA && !detecting) {
    const now = Date.now();
    const shouldRunJsQr = barcodeDetector || (now - lastJsQrAttempt >= JSQR_INTERVAL_MS);
    if (shouldRunJsQr) {
      detecting = true;
      try {
        if (barcodeDetector) {
          const codes = await barcodeDetector.detect(video);
          if (codes.length) onDetect(codes[0].rawValue);
          else if (now - lastEmptyLog > 1500) { dlog('탐지된 코드 없음'); lastEmptyLog = now; }
        } else {
          lastJsQrAttempt = now;
          const text = decodeWithJsQR();
          if (text) onDetect(text);
          else if (now - lastEmptyLog > 1500) { dlog('탐지된 코드 없음'); lastEmptyLog = now; }
        }
      } catch (e) {
        dlog(`디코드 오류: ${(e && (e.message || e.name)) || e}`);
      }
      detecting = false;
    }
  }
  state.animFrame = requestAnimationFrame(tick);
}

// ── 카메라 시작 ──
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    state.scanning = true;
    startScreen.style.display = 'none';
    scanView.style.display = 'flex';
    tick();
  } catch (e) {
    showToast('카메라 접근 실패: ' + e.message, true);
  }
}

// ── 초기화 ──
function reset() {
  cancelAnimationFrame(state.animFrame);
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
  Object.assign(state, { chunks: {}, totalChunks: 0, expectedHash: null,
    lastScanned: null, completed: false, scanning: false, animFrame: null });

  resultView.classList.remove('active');
  scanView.style.display = 'none';
  progressBar.style.display = 'none';
  progressFill.style.width = '0%';
  chips.innerHTML = '';
  overlayCount.textContent = '';
  overlayHint.style.display = 'block';
  startScreen.style.display = 'flex';
}

// ── 클립보드 복사 ──
$('copyBtn').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(resultText.value);
    showToast('클립보드에 복사되었습니다! ✓');
  } catch {
    resultText.select();
    document.execCommand('copy');
    showToast('복사되었습니다 ✓');
  }
});

// ── 파일 저장 ──
$('saveBtn').addEventListener('click', () => {
  const ts = new Date().toISOString().replace(/[:.]/g, '_').slice(0, 19);
  const blob = new Blob([resultText.value], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `qr_scan_${ts}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('파일 저장됨 ✓');
});

// ── 이벤트 ──
$('startBtn').addEventListener('click', startCamera);
$('resetBtn').addEventListener('click', reset);
$('rescanBtn').addEventListener('click', reset);
</script>
</body>
</html>
